<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-eval' 'unsafe-inline' https://cdn.jsdelivr.net; connect-src *; style-src 'self' 'unsafe-inline'; default-src 'self' data: blob: https: http:;">
  <title>RAG 知识库助手</title>
  <link rel="icon" href="data:,">
  
  <!-- CSS 文件 -->
  <link rel="stylesheet" href="css/style.css?v=20260423">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/chat.css">
  <link rel="stylesheet" href="css/upload.css">
  <link rel="stylesheet" href="css/history.css">
  <link rel="stylesheet" href="css/settings.css">
</head>
<body>
  <!-- 应用容器 -->
  <div class="app-container">
    <!-- 侧边栏 -->
    <aside class="sidebar">
      <!-- 侧边栏头部 - Logo -->
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <div class="sidebar-logo-icon">R</div>
          <span class="sidebar-logo-text">RAG助手</span>
        </div>
      </div>
      
      <!-- 侧边栏导航 -->
      <nav class="sidebar-nav">
        <ul class="sidebar-nav-list">
          <!-- 智能问答 -->
          <li class="sidebar-nav-item active" data-page="chat">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M8.625 12a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H8.25m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H12m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0h-.375M21 12c0 4.556-4.03 8.25-9 8.25a9.764 9.764 0 01-2.555-.337A5.972 5.972 0 015.41 20.97a5.969 5.969 0 01-.474-.065 4.48 4.48 0 00.978-2.025c.09-.457-.133-.901-.467-1.226C3.93 16.178 3 14.189 3 12c0-4.556 4.03-8.25 9-8.25s9 3.694 9 8.25z" />
            </svg>
            <span>智能问答</span>
          </li>
          
          <!-- 知识库管理 -->
          <li class="sidebar-nav-item" data-page="upload">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 10.5v6m3-3H9m4.06-7.19l-2.12-2.12a1.5 1.5 0 00-1.061-.44H4.5A2.25 2.25 0 002.25 6v12a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9a2.25 2.25 0 00-2.25-2.25h-5.379a1.5 1.5 0 01-1.06-.44z" />
            </svg>
            <span>知识库管理</span>
          </li>
          
          <!-- 对话历史 -->
          <li class="sidebar-nav-item" data-page="history">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <span>对话历史</span>
          </li>
          
          <!-- 系统设置 -->
          <li class="sidebar-nav-item" data-page="settings">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.24-.438.613-.431.992a6.759 6.759 0 010 .255c-.007.378.138.75.43.99l1.005.828c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 01-.22.128c-.331.183-.581.495-.644.869l-.212 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 010-.255c.007-.378-.138-.75-.43-.99l-1.004-.828a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.281z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
            <span>系统设置</span>
          </li>
        </ul>

        <div class="sidebar-conv" id="sidebar-conv">
          <div class="sidebar-conv-header">
            <div class="sidebar-conv-header-title">最近对话</div>
            <div class="sidebar-conv-header-actions">
              <button class="sidebar-conv-action" id="sidebar-new-chat-btn" title="新建对话">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
                </svg>
              </button>
              <button class="sidebar-conv-action" id="sidebar-open-history-btn" title="全部对话">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
              </button>
            </div>
          </div>
          <div class="sidebar-conv-empty hidden" id="sidebar-conv-empty">暂无对话</div>
          <div class="sidebar-conv-list" id="sidebar-conv-list"></div>
        </div>
      </nav>
      
      <!-- 侧边栏底部 -->
      <div class="sidebar-footer">
        <span>RAG Knowledge Assistant v1.0</span>
      </div>
    </aside>
    
    <!-- 主内容区 -->
    <main class="main-content">
      <!-- 页面容器 -->
      <div class="page-container">
        
        <!-- ==================== 智能问答页面 ==================== -->
        <section id="page-chat" class="page-section active chat-page">
          <div class="chat-page-header">
            <div class="chat-page-header-title">智能问答</div>
            <div class="chat-page-header-actions">
              <button class="btn btn-primary btn-sm" id="chat-new-chat-btn" type="button" title="新建对话">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
                </svg>
                <span>新建对话</span>
              </button>
            </div>
          </div>
          <!-- 对话消息区域 -->
          <div class="chat-messages-container" id="chat-messages-container">
            <!-- 欢迎界面 -->
            <div class="chat-welcome" id="chat-welcome">
              <div class="chat-welcome-icon">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09zM18.259 8.715L18 9.75l-.259-1.035a3.375 3.375 0 00-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 002.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 002.456 2.456L21.75 6l-1.035.259a3.375 3.375 0 00-2.456 2.456zM16.894 20.567L16.5 21.75l-.394-1.183a2.25 2.25 0 00-1.423-1.423L13.5 18.75l1.183-.394a2.25 2.25 0 001.423-1.423l.394-1.183.394 1.183a2.25 2.25 0 001.423 1.423l1.183.394-1.183.394a2.25 2.25 0 00-1.423 1.423z" />
                </svg>
              </div>
              <h1 class="chat-welcome-title">欢迎使用 RAG 知识库助手</h1>
              <p class="chat-welcome-description">
                基于检索增强生成技术，智能回答您知识库中的问题。
                <br>上传文档，开始智能对话。
              </p>
              <div class="chat-welcome-suggestions">
                <div class="chat-welcome-suggestion" data-question="请介绍一下我的知识库中有哪些内容？">
                  请介绍一下我的知识库中有哪些内容？
                </div>
                <div class="chat-welcome-suggestion" data-question="总结一下文档中的关键信息">
                  总结一下文档中的关键信息
                </div>
                <div class="chat-welcome-suggestion" data-question="帮我查找关于...的内容">
                  帮我查找关于...的内容
                </div>
              </div>
            </div>
            
            <!-- 消息列表 -->
            <div class="chat-messages hidden" id="chat-messages">
              <!-- 消息将通过 JS 动态添加 -->
            </div>
          </div>
          
          <!-- 输入框区域 -->
          <div class="chat-input-container">
            <div class="chat-input-wrapper">
              <div class="chat-input-box">
                <textarea 
                  class="chat-textarea" 
                  id="chat-input"
                  placeholder="输入您的问题..."
                  rows="1"
                ></textarea>
                <div class="chat-input-actions">
                  <button class="chat-input-btn chat-doc-toggle-btn" id="toggle-doc-filter-btn" title="选择文档">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-8.25a2.25 2.25 0 00-2.25-2.25H6.75A2.25 2.25 0 004.5 6v12A2.25 2.25 0 006.75 20.25h5.25" />
                      <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 18.75l2.25 2.25 4.5-4.5" />
                    </svg>
                    <span id="toggle-doc-filter-label">选择文档</span>
                  </button>
                  <button class="chat-input-btn" id="clear-chat-btn" title="清空对话">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" />
                    </svg>
                  </button>
                  <button class="chat-send-btn" id="send-btn" title="发送">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5" />
                    </svg>
                  </button>
                </div>
              </div>
              <div class="chat-doc-filter-panel hidden" id="chat-doc-filter-panel"></div>
              <div class="chat-input-footer">
                <span class="chat-input-footer-item">
                  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
                  </svg>
                  Enter 发送，Shift+Enter 换行
                </span>
              </div>
            </div>
          </div>
        </section>
        
        <!-- ==================== 知识库管理页面 ==================== -->
        <section id="page-upload" class="page-section">
          <div class="placeholder-page">
            <div class="placeholder-icon">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 10.5v6m3-3H9m4.06-7.19l-2.12-2.12a1.5 1.5 0 00-1.061-.44H4.5A2.25 2.25 0 002.25 6v12a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9a2.25 2.25 0 00-2.25-2.25h-5.379a1.5 1.5 0 01-1.06-.44z" />
              </svg>
            </div>
            <h2 class="placeholder-title">知识库管理</h2>
            <p class="placeholder-text">上传和管理您的知识库文档</p>
          </div>
        </section>
        
        <!-- ==================== 对话历史页面 ==================== -->
        <section id="page-history" class="page-section">
          <div class="history-page">
            <div class="page-header">
              <h2 class="page-title">对话历史</h2>
              <p class="page-description">查看和管理您的历史对话记录</p>
            </div>

            <div class="history-toolbar">
              <button class="btn btn-primary" id="history-new-chat-btn">新建对话</button>
              <button class="btn btn-danger" id="history-delete-all-btn">删除全部</button>
            </div>

            <div class="history-content" id="history-content">
              <div class="history-empty hidden" id="history-empty">
                <div class="history-empty-icon">
                  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M8.625 9.75a.375.375 0 11-.75 0 .375.375 0 01.75 0zm7.5 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zM21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9.75 15.75h4.5" />
                  </svg>
                </div>
                <div class="history-empty-title">暂无对话</div>
                <div class="history-empty-text">开始一次对话后，这里会显示历史记录</div>
                <button class="btn btn-primary" id="history-empty-new-chat-btn">开始对话</button>
              </div>

              <div class="history-list" id="history-list"></div>
            </div>
          </div>
        </section>
        
        <!-- ==================== 系统设置页面 ==================== -->
        <section id="page-settings" class="page-section">
          <div class="placeholder-page">
            <div class="placeholder-icon">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.24-.438.613-.431.992a6.759 6.759 0 010 .255c-.007.378.138.75.43.99l1.005.828c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 01-.22.128c-.331.183-.581.495-.644.869l-.212 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 010-.255c.007-.378-.138-.75-.43-.99l-1.004-.828a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.281z" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              </svg>
            </div>
            <h2 class="placeholder-title">系统设置</h2>
            <p class="placeholder-text">配置模型参数和系统选项</p>
          </div>
        </section>
        
      </div>
    </main>
  </div>
  
  <!-- Toast 容器 -->
  <div class="toast-container" id="toast-container"></div>
  
  <!-- marked.js - Markdown 解析 -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  
  <!-- JavaScript 文件 -->
  <script src="js/components.js"></script>
  <script src="js/api.js"></script>
  <script src="js/document-preview.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/upload.js"></script>
  <script src="js/history.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
